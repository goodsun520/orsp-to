server {
    listen 80;
    listen [::]:80;
    server_name book.openany.shop;

    access_log /var/log/nginx/book.openany.shop.access.log;
    error_log /var/log/nginx/book.openany.shop.error.log;

    location / {
        proxy_pass http://127.0.0.1:8790/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # Overwrite caller-supplied forwarding headers; the app trusts exactly this proxy hop.
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
